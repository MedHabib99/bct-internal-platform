{% extends "base.html" %}
{% block title %}Set new password{% endblock %}
{% block content %}
<div class="card">
  <h1>Set a new password</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Save new password</button>
  </form>
</div>
{% endblock %}
