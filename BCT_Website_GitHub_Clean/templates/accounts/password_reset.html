{% extends "base.html" %}
{% block title %}Forgot password{% endblock %}
{% block content %}
<div class="card">
  <h1>Forgot password</h1>
  <p>Enter your email. We’ll send you a link to set a new password.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.email.label_tag }}<br>
    {{ form.email }}
    <br><br>
    <button class="btn" type="submit">Send reset link</button>
  </form>
</div>
{% endblock %}
