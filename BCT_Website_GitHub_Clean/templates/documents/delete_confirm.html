{% extends "base.html" %}
{% block title %}Delete Document{% endblock %}
{% block content %}
<div class="card">
  <h1 style="margin-top:0">Delete Document</h1>
  <p>Are you sure you want to delete “{{ object.title }}”?</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn" type="submit">Yes, delete</button>
    <a class="btn" href="{% url 'documents:index' %}" style="background:#64748b">Cancel</a>
  </form>
</div>
{% endblock %}
